[build]
# rustflags = ["-Zlocation-detail=none"]
target = ["x86_64-unknown-linux-musl"]
# rustc-wrapper = "sccache"

[target.x86_64-unknown-linux-musl]
linker = "clang"
rustflags = ["-C", "link-arg=--ld-path=wild"]

[env]
# K8S_OPENAPI_ENABLED_VERSION = { value = "1.31", force = true }

[source.crates-io]
replace-with = "local-proxy"

[source.local-proxy]
registry = "sparse+http://cc.magicloud.lan/index/"

[http]
timeout = 300
low-speed-limit = 0
