---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: path-k8s-webhook
  namespace: test
spec:
  selector:
    matchLabels:
      app: path-k8s-webhook
  replicas: 1
  template:
    metadata:
      labels:
        app: path-k8s-webhook
    spec:
      # serviceAccountName: path-k8s-webhook
      # automountServiceAccountToken: true
      containers:
      - name: path-k8s-webhook
        image: registry.magicloud.lan/pkw:latest
        args:
          - webhook
          - -c
          - /tls/tls.crt
          - -k
          - /tls/tls.key
          - -j
          - "$.spec.tls[*].hosts[*]"
          - -p
          - "$.spec.rules[*].host"
          - -n
          - ingress-tls
        ports:
        - containerPort: 443
          name: https
        volumeMounts:
        - name: tls
          mountPath: /tls
        resources:
          requests:
            memory: "1Gi"
          limits:
            memory: "2Gi"
        env:
        - name: RUST_LOG
          value: DEBUG
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          # In various places, this value is written without "http://". That does not work.
          value: http://alloy.monitoring.svc.cluster.local:4317
        - name: OTEL_EXPORTER_OTLP_INSECURE
          value: "true"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: grpc
      volumes:
        - name: tls
          csi:
            driver: csi.cert-manager.io
            readOnly: true
            volumeAttributes:
              csi.cert-manager.io/issuer-name: step-issuer
              csi.cert-manager.io/issuer-kind: StepClusterIssuer
              csi.cert-manager.io/issuer-group: certmanager.step.sm
              csi.cert-manager.io/dns-names: path-k8s-webhook.test.svc,path-k8s-webhook.test.svc.cluster.local
              csi.cert-manager.io/duration: 24h
              csi.cert-manager.io/renew-before: 1h
              csi.cert-manager.io/fs-group: "1000"
---
apiVersion: v1
kind: Service
metadata:
  name: path-k8s-webhook
  namespace: test
spec:
  selector:
    app: path-k8s-webhook
  type: ClusterIP
  ports:
  - name: path-k8s-webhook
    protocol: TCP
    port: 443
    targetPort: https
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: path-k8s-webhook
  namespace: test
webhooks:
- name: "path-k8s-webhook.magicloud.lan"
  rules:
  - apiGroups:   ["*"]
    apiVersions: ["*"]
    operations:  ["CREATE", "UPDATE"]
    resources:   ["ingresses"]
    scope:       "*"
  clientConfig:
    service:
      namespace: "test"
      name: "path-k8s-webhook"
      path: "/validate"
      port: 443
    caBundle: 
  admissionReviewVersions: ["v1"]
  sideEffects: None
  timeoutSeconds: 5