#apiVersion: v1
#kind: Namespace
#metadata:
#  name: test
#---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: test
spec:
  selector:
    matchLabels:
      app: whoami
  replicas: 1
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
      - name: whoami
        image: traefik/whoami
        ports:
        - containerPort: 80
          name: http
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: test
spec:
  type: LoadBalancer
  loadBalancerClass: io.cilium/node
  selector:
    app: whoami
  ports:
  - name: http
    protocol: TCP
    port: 8888
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    external-dns.alpha.kubernetes.io/hostname: whoami.magicloud.lan.
#    external-dns.alpha.kubernetes.io/target: "192.168.0.102"
    cert-manager.io/issuer: step-issuer
    cert-manager.io/issuer-kind: StepClusterIssuer
    cert-manager.io/issuer-group: certmanager.step.sm
  name: whoami
  namespace: test
spec:
  rules:
  - host: whoami.magicloud.lan
    http:
      paths:
      - backend:
          service:
            name: whoami
            port:
              number: 80
        path: /
        pathType: Prefix
#  tls:
#  - hosts:
#      - whoami.magicloud.lan
#    secretName: whoami-tls
